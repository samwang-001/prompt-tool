    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        background: #0f172a;

        padding: 2rem;

        -webkit-text-fill-color: transparent;
    }
    .subtitle {
        color: #64748b;
        font-size: 0.85rem;
        margin-bottom: 2rem;
    }
    .category-card {
        background: rgba(30, 41, 59, 0.8);
        border: 1px solid rgba(71, 85, 105, 0.3);
        border-radius: 12px;
        padding: 1.25rem;
        margin-bottom: 1.5rem;
    }
    .category-name {
        font-size: 1.1rem;
        font-weight: 600;
        margin-bottom: 0.75rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }
    .category-name .icon { font-size: 1.3rem; }
    .badge {
        font-size: 0.7rem;
        background: rgba(99, 102, 241, 0.2);
        color: #a5b4fc;
        padding: 0.15rem 0.5rem;
        border-radius: 10px;
        font-weight: 500;
    }
    .words-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
    }
    /* 父词标签 */
    .word-tag {
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
        padding: 0.35rem 0.7rem;
        border-radius: 6px;
        font-size: 0.8rem;
        border: 1px solid rgba(71, 85, 105, 0.3);
        background: rgba(51, 65, 85, 0.4);
        color: #cbd5e1;
        cursor: default;
        transition: all 0.15s;
    }
    .word-tag.word-parent {
        border-color: rgba(129, 140, 248, 0.35);
        background: rgba(99, 102, 241, 0.08);
        color: #c7d2fe;
    }
    .expand-arrow {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 16px; height: 16px;
        font-size: 0.5rem;
        color: rgba(148, 163, 184, 0.5);
        border-radius: 3px;
        transition: all 0.2s;
    }
    .expand-arrow:hover {
        color: #a5b4fc;
        background: rgba(99, 102, 241, 0.15);
    }
    /* 子词汇面板 */
    .word-children-panel {
        display: inline-flex;
        flex-wrap: wrap;
        gap: 0.3rem;
        padding: 0.35rem 0.5rem;
        border: 1px dashed rgba(99, 102, 241, 0.15);
        border-radius: 6px;
        background: rgba(99, 102, 241, 0.03);
        margin-left: 0.2rem;
    }
    .word-tag.word-child {
        font-size: 0.72rem;
        padding: 0.22rem 0.55rem;
        background: rgba(99, 102, 241, 0.05);
        border-color: rgba(99, 102, 241, 0.15);
        color: rgba(167, 139, 250, 0.7);
    }
    /* 统计条 */
    .stats-bar {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
        margin-bottom: 1.5rem;
    }
    .stat-item {
        background: rgba(30, 41, 59, 0.8);
        border: 1px solid rgba(71, 85, 105, 0.3);
        border-radius: 8px;
        padding: 0.6rem 1rem;
        font-size: 0.8rem;
    }
    .stat-item strong {
        color: #a5b4fc;
        font-size: 1.1rem;
    }
    /* 图例 */
    .legend {
        display: flex;
        gap: 1.5rem;
        margin-bottom: 1rem;
        font-size: 0.75rem;
        color: #94a3b8;
    }
    .legend-item { display: flex; align-items: center; gap: 0.35rem; }
    .legend-dot {
        width: 8px; height: 8px;
        border-radius: 2px;
    }
    .legend-dot.parent { background: rgba(99, 102, 241, 0.5); }
    .legend-dot.child { background: rgba(99, 102, 241, 0.2); border: 1px dashed rgba(99, 102, 241, 0.2); }
    .legend-dot.flat { background: rgba(51, 65, 85, 0.6); border: 1px solid rgba(71, 85, 105, 0.3); }
</style>

// ============ 渲染 ============
function renderPreview() {
    const container = document.getElementById('categoriesContainer');
    const statsBar = document.getElementById('statsBar');

    let totalParents = 0;
    let totalChildren = 0;
    let totalFlat = 0;

    Object.entries(thesaurusDesign).forEach(([catName, words]) => {
        words.forEach(w => {
            if (typeof w === 'object' && w.children) {
                totalParents++;
                totalChildren += w.children.length;
            } else {
                totalFlat++;
            }
        });
    });

    statsBar.innerHTML = `
        <div class="stat-item">📦 <strong>${totalParents}</strong> 品类（父词）</div>
        <div class="stat-item">🏷️ <strong>${totalChildren}</strong> 具体商品（子词）</div>
        <div class="stat-item">📌 <strong>${totalFlat}</strong> 独立词</div>
        <div class="stat-item">📊 总计可选项 <strong>${totalParents + totalChildren + totalFlat}</strong></div>
    `;

    let html = '';
    Object.entries(thesaurusDesign).forEach(([catName, words]) => {
        const wordTags = words.map(w => renderWordTag(w)).join('');

        html += `
        <div class="category-card">
            <div class="category-name">
                <span class="icon">📋</span> ${catName}
                <span class="badge">${words.length}项</span>
            </div>
            <div class="words-grid">${wordTags}</div>
        </div>`;
    });

    container.innerHTML = html;

    // 绑定展开事件
    document.querySelectorAll('.expand-arrow').forEach(arrow => {
        arrow.addEventListener('click', function(e) {
            e.stopPropagation();
            const parent = this.closest('.word-tag');
            const panel = parent.nextElementSibling;
            if (panel && panel.classList.contains('word-children-panel')) {
                const isHidden = panel.style.display === 'none';
                panel.style.display = isHidden ? 'inline-flex' : 'none';
                this.textContent = isHidden ? '▲' : '▼';
            }
        });
    });
}

function renderWordTag(word) {
    if (typeof word === 'object' && word.children) {
        // 分层词：父词 + 子词汇面板
        let html = `<span class="word-tag word-parent">
            ${escapeHtml(word.text)}
            <span class="expand-arrow" title="展开子商品">▼</span>
        </span>`;
        html += `<span class="word-children-panel" style="display:none;">`;
        word.children.forEach(child => {
            html += `<span class="word-tag word-child">${escapeHtml(child)}</span>`;
        });
        html += `</span>`;
        return html;
    }
    // 普通词
    return `<span class="word-tag">${escapeHtml(String(word))}</span>`;
}

function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

renderPreview();
